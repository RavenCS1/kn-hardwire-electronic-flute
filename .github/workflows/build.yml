name: Build project

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake gcc-arm-none-eabi

      - name: Install GCC 15.2.0 ARM
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi-15
          sudo update-alternatives --install /usr/bin/arm-none-eabi-gcc arm-none-eabi-gcc /usr/bin/arm-none-eabi-gcc-15 100
          sudo update-alternatives --install /usr/bin/arm-none-eabi-g++ arm-none-eabi-g++ /usr/bin/arm-none-eabi-g++-15 100

      - name: Verify GCC ARM 15
        run: arm-none-eabi-gcc --version

      - name: Configure CMake
        run: |
          mkdir software/build
          cd software/build
          cmake ..

      - name: Build project
        run: |
          cd software/build
          make

      - name: Upload .uf2 firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: software/build/*.uf2
