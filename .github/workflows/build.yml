name: Pico Firmware Build

on:
  push: [ main ]
  pull_request: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 1. Pobierz Pico SDK (jeśli brak submodule)
      - name: Setup Pico SDK
        run: |
          if [ ! -d "pico-sdk" ]; then
            echo "Downloading Pico SDK..."
            git clone -b master --depth=1 https://github.com/raspberrypi/pico-sdk.git
          fi
          cd pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=$(pwd)" >> $GITHUB_ENV
          echo "PICO_SDK_PATH=$PICO_SDK_PATH"

      # 2. Toolchain ARM
      - name: Install ARM toolchain
        run: |
          sudo apt update -qq
          sudo apt install -y -qq cmake ninja-build \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            python3 python3-pip

      # 3. Verify
      - name: Verify tools
        run: |
          arm-none-eabi-gcc --version |
