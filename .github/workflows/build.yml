name: Pico Firmware Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Pico SDK
        run: |
          if [ ! -d "pico-sdk" ]; then
            git clone --depth 1 https://github.com/raspberrypi/pico-sdk
            cd pico-sdk && git submodule update --init
          fi
          echo "PICO_SDK_PATH=$(pwd)/pico-sdk" >> $GITHUB_ENV

      - name: Install ARM toolchain
        run: |
          sudo apt update -qq
          sudo apt install -y cmake ninja-build gcc-arm-none-eabi python3-pip

      - name: Configure
        run: |
          mkdir -p software/build
          cd software/build
          cmake .. -DPICO_SDK_PATH=$PICO_SDK_PATH -GNinja

      - name: Build
        run: cd software/build && ninja

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: software/build/*.uf2
