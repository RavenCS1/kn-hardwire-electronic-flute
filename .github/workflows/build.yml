name: Build project

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake

      # INSTALACJA GCC 14.2.0 (host + arm-none-eabi z TAR)
      - name: Install GCC 14.2 (host + ARM none eabi 14.2.0)
        run: |
          # GCC 14.2.0 dla hosta (już jest, ale na wszelki wypadek):
          sudo apt install -y gcc-14 g++-14
          # Pobierz GNU Arm Embedded Toolchain 14.2.0
          wget https://developer.arm.com/-/media/Files/downloads/gnu-rm/14.2.0/gcc-arm-none-eabi-14.2.0-x86_64-linux.tar.bz2
          sudo mkdir -p /opt/arm-none-eabi-14.2.0
          sudo tar -C /opt/arm-none-eabi-14.2.0 --strip-components=1 -xjf gcc-arm-none-eabi-14.2.0-x86_64-linux.tar.bz2

      - name: Download Pico SDK + pico_sdk_import.cmake
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk && git submodule update --init
          # Utwórz wymagany plik
          cat > pico_sdk_import.cmake << 'EOF'
          set(PICO_SDK_PATH "${CMAKE_CURRENT_LIST_DIR}/pico-sdk")
          include(${PICO_SDK_PATH}/pico_sdk_init.cmake)
          EOF

      - name: Configure CMake (GCC 14.2.0 dla hosta i targeta)
        run: |
          mkdir software/build
          cd software/build
          # Użyj GCC 14.2.0 dla hosta i arm-none-eabi
          CC=/opt/arm-none-eabi-14.2.0/bin/arm-none-eabi-gcc \
          CXX=/opt/arm-none-eabi-14.2.0/bin/arm-none-eabi-g++ \
          cmake ..

      - name: Build project
        run: |
          cd software/build
          make

      - name: Upload .uf2 firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: software/build/*.uf2
