name: Pico Firmware Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout + Pico SDK (submodule)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. Pico SDK toolchain (optymalne wersje)
      - name: Install Pico SDK tools
        run: |
          sudo apt update -y -qq
          sudo apt install -y -qq cmake gcc-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib \
            ninja-build python3 python3-pip python3-setuptools

      # 3. PICO_SDK_PATH setup
      - name: Setup Pico SDK
        run: |
          # Znajdź SDK (submodule lub lokalny)
          if [ -d "pico-sdk" ]; then
            echo "PICO_SDK_PATH=$(pwd)/pico-sdk" >> $GITHUB_ENV
          elif [ -d "lib/pico-sdk" ]; then  
            echo "PICO_SDK_PATH=$(pwd)/lib/pico-sdk" >> $GITHUB_ENV
          else
            echo "ERROR: pico-sdk not found!"
            exit 1
          fi
          echo "PICO_SDK_PATH=$PICO_SDK_PATH"

      # 4. Kompilator info
      - name: Toolchain info
        run: |
          arm-none-eabi-gcc --version
          cmake --version

      # 5. CMake z Pico optymalizacjami
      - name: Configure CMake
        run: |
          mkdir
