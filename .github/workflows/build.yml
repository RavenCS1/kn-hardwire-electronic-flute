name: Build project

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake gcc-arm-none-eabi

      - name: Download Pico SDK + pico_sdk_import.cmake
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk && git submodule update --init
          # Utwórz wymagany plik
          cat > pico_sdk_import.cmake << 'EOF'
          set(PICO_SDK_PATH "${CMAKE_CURRENT_LIST_DIR}/pico-sdk")
          include(${PICO_SDK_PATH}/pico_sdk_init.cmake)
          EOF

      - name: Configure CMake
        run: |
          mkdir software/build
          cd software/build
          cmake ..

      - name: Build project
        run: |
          cd software/build
          make

      - name: Upload .uf2 firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: software/build/*.uf2
